<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recycle Software</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 data-i18n="appTitle">Sistema de Reciclagem</h1>
    <div class="header-actions">
      <label for="languageSelect" data-i18n="language">Idioma</label>
      <select id="languageSelect"></select>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="purchase" data-i18n="purchaseTab">Compra</button>
    <button class="tab" data-tab="sale" data-i18n="saleTab">Venda</button>
    <button class="tab" data-tab="search" data-i18n="searchTab">Clientes</button>
    <button class="tab" data-tab="summary" data-i18n="summaryTab">Resumo</button>
    <button class="tab" data-tab="settings" data-i18n="settingsTab">Configurações</button>
  </nav>

  <main>
    <section class="tab-panel active" id="panel-purchase">
      <h2 data-i18n="purchaseFormTitle">Cadastro de Compra</h2>
      <div id="purchaseFormContainer"></div>
    </section>

    <section class="tab-panel" id="panel-sale">
      <h2 data-i18n="saleFormTitle">Cadastro de Venda</h2>
      <div id="saleFormContainer"></div>
    </section>

    <section class="tab-panel" id="panel-search">
      <h2 data-i18n="searchTitle">Busca de Clientes</h2>
      <div class="card">
        <div class="form-grid two-cols">
          <label>
            <span data-i18n="searchInput">Buscar por nome, ID ou telefone</span>
            <input id="searchInput" type="text" placeholder="Maria / A1B2C3D4 / +55..." />
          </label>
          <label>
            <span data-i18n="filterType">Tipo</span>
            <select id="searchTypeFilter">
              <option value="all" data-i18n="all">Todos</option>
              <option value="purchase" data-i18n="purchaseTab">Compra</option>
              <option value="sale" data-i18n="saleTab">Venda</option>
            </select>
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="clientId">ID Cliente</th>
                <th data-i18n="clientName">Nome do Cliente</th>
                <th data-i18n="phone">Telefone</th>
                <th data-i18n="entryDate">Data de Entrada</th>
                <th data-i18n="transactionCode">Código de Transação</th>
                <th data-i18n="total">Total</th>
                <th data-i18n="type">Tipo</th>
                <th data-i18n="actions">Ações</th>
              </tr>
            </thead>
            <tbody id="searchResults"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-summary">
      <h2 data-i18n="summaryTitle">Resumo e Gráficos</h2>
      <div class="card summary-card">
        <div class="summary-top">
          <div class="metric"><span data-i18n="totalTransactions">Transações</span><strong id="metricTransactions">0</strong></div>
          <div class="metric"><span data-i18n="purchaseVolume">Volume Compra</span><strong id="metricPurchase">0</strong></div>
          <div class="metric"><span data-i18n="saleVolume">Volume Venda</span><strong id="metricSale">0</strong></div>
        </div>
        <div class="chart-controls">
          <label>
            <span data-i18n="chartType">Tipo de gráfico</span>
            <select id="chartType">
              <option value="bar" data-i18n="bar">Picos (Barras)</option>
              <option value="pie" data-i18n="pie">Pizza</option>
            </select>
          </label>
        </div>
        <canvas id="summaryChart" width="900" height="380"></canvas>
      </div>
    </section>

    <section class="tab-panel" id="panel-settings">
      <h2 data-i18n="settingsTitle">Configurações</h2>
      <div class="card">
        <div class="form-grid two-cols">
          <label>
            <span data-i18n="companyName">Nome da empresa</span>
            <input id="companyName" type="text" placeholder="Recycle Software Ltda" />
          </label>
          <label>
            <span data-i18n="companyAddress">Endereço da empresa</span>
            <input id="companyAddress" type="text" placeholder="Rua Exemplo, 123" />
          </label>
          <label>
            <span data-i18n="defaultCategory">Categoria padrão</span>
            <input id="defaultCategory" type="text" placeholder="Metal" />
          </label>
          <label>
            <span data-i18n="currency">Moeda</span>
            <input id="currency" type="text" placeholder="BRL" />
          </label>
        </div>
        <div class="button-row">
          <button id="saveSettings" class="primary" data-i18n="save">Salvar</button>
          <button id="exportExcel" data-i18n="exportExcel">Download Excel</button>
        </div>
      </div>
    </section>
  </main>

  <section class="print-area" id="printArea"></section>

  <template id="transactionFormTemplate">
    <form class="card transaction-form">
      <div class="form-grid three-cols">
        <label><span data-i18n="clientId">ID Cliente</span><input name="clientId" readonly /></label>
        <label><span data-i18n="entryDate">Data de Entrada</span><input name="entryDate" type="date" required /></label>
        <label><span data-i18n="transactionCode">Código de Transação</span><input name="transactionCode" required /></label>
      </div>
      <div class="form-grid three-cols">
        <label><span data-i18n="clientName">Nome do Cliente</span><input name="clientName" required /></label>
        <label><span data-i18n="phone">Telefone</span><input name="phone" /></label>
        <label><span data-i18n="address">Endereço</span><input name="address" /></label>
      </div>
      <div class="form-grid three-cols">
        <label><span data-i18n="category">Categoria</span><input name="category" /></label>
        <label><span data-i18n="serialNumber">Número de série</span><input name="serialNumber" /></label>
        <label><span data-i18n="supplier">Fornecedor</span><input name="supplier" /></label>
      </div>
      <div class="form-grid two-cols">
        <label><span data-i18n="description">Descrição</span><textarea name="description"></textarea></label>
        <label><span data-i18n="vehiclePlate">Placa do carro</span><input name="vehiclePlate" /></label>
      </div>

      <h3 data-i18n="itemsTitle">Itens (preenchimento automático até 15 linhas)</h3>
      <div class="table-wrap">
        <table class="items-table">
          <thead>
            <tr>
              <th>#</th>
              <th data-i18n="description">Descrição</th>
              <th data-i18n="quantity">Quantidade</th>
              <th data-i18n="unit">Unidade</th>
              <th data-i18n="unitPrice">Preço Unitário</th>
              <th data-i18n="total">Total</th>
            </tr>
          </thead>
          <tbody class="itemsBody"></tbody>
        </table>
      </div>

      <div class="form-grid three-cols">
        <label><span data-i18n="quantity">Quantidade</span><input name="quantity" type="number" step="0.01" /></label>
        <label><span data-i18n="unit">Unidade</span><input name="unit" /></label>
        <label><span data-i18n="unitPrice">Preço Unitário</span><input name="unitPrice" type="number" step="0.01" /></label>
      </div>
      <div class="form-grid three-cols">
        <label class="checkbox-label"><input name="manualTotalEnabled" type="checkbox" /><span data-i18n="manualTotal">Usar total manual</span></label>
        <label><span data-i18n="total">Total</span><input name="total" type="number" step="0.01" /></label>
        <label><span data-i18n="observation">Observação</span><input name="observation" /></label>
      </div>
      <div class="button-row">
        <button type="submit" class="primary" data-i18n="save">Salvar</button>
        <button type="button" class="printBtn" data-i18n="printA4">Imprimir A4 (2 vias)</button>
      </div>
    </form>
  </template>

  <script src="app.js"></script>
</body>
</html>
